<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c4a6e">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ANJANI</title>
  <meta name="application-name" content="ANJANI">
  <meta name="apple-mobile-web-app-title" content="ANJANI">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://esm.sh">

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "dexie":              "https://esm.sh/dexie@4",
      "@sentry/browser":    "https://esm.sh/@sentry/browser@8"
    }
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="src/errors.js"></script>
  <script type="module" src="src/cache.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --water-deep:   #0c4a6e;
      --water-mid:    #0369a1;
      --water-light:  #38bdf8;
      --water-pale:   #e0f2fe;
      --ripple:       rgba(14,165,233,0.08);
      --text-primary: #0c2340;
      --text-muted:   #64748b;
    }
    /* Safe Area Padding for modern mobile screens */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    .pac-container { z-index: 100000 !important; border-radius: 12px; box-shadow: 0 10px 30px rgba(12,74,110,0.12); }
    body {
      font-family: 'Nunito', -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background: #f8fafc;
      overscroll-behavior: none; /* Prevents "pull to refresh" on Chrome Android */
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .nav-item.active { background: linear-gradient(135deg, #e0f2fe, rgba(14,165,233,0.12)); color: #0369a1; border-right: 3px solid #38bdf8; font-weight: 800; }
    .mob-item.active { color: #0369a1; font-weight: 900; }
    
    #offline-banner { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #f59e0b; color: white; text-align: center; font-size: 11px; padding: 6px; }
    body.is-offline #offline-banner { display: block; }
    
    /* Ensure loader doesn't block clicks when hidden */
    #loader.hidden { display: none !important; pointer-events: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col lg:flex-row">

<div id="offline-banner">⚡ OFFLINE MODE — Changes will sync when connected</div>
<div id="sync-badge" style="display:none; position:fixed; bottom:88px; right:16px; z-index:60; background:#f59e0b; color:white; border-radius:999px; padding:4px 10px; font-size:10px; font-weight:bold;">🔄 <span id="sync-count">0</span> queued</div>

<div id="loader" class="fixed inset-0 bg-white/95 backdrop-blur-sm z-[200] flex flex-col items-center justify-center">
  <div class="text-5xl mb-4 text-blue-600 animate-spin">🌀</div>
  <div class="font-bold text-slate-500 text-sm">LOADING SYSTEM...</div>
  <div id="debug-log" class="mt-6 text-xs text-red-600 hidden max-w-xs text-center"></div>
</div>

<aside class="hidden lg:flex w-64 bg-white flex-col h-full border-r border-sky-100 z-20">
  <div class="h-20 flex items-center px-6 border-b">
    <h1 class="font-black text-xl tracking-wide text-sky-900">ANJANI<span class="text-sky-500">WATER</span></h1>
  </div>
  <nav class="flex-1 py-6 space-y-1">
    <button onclick="go('orders')" id="d-btn-orders" class="nav-item active w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="shopping-cart" class="mr-3 w-5 h-5"></i> ORDERS</button>
    <button onclick="go('payments')" id="d-btn-payments" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="credit-card" class="mr-3 w-5 h-5"></i> PAYMENTS</button>
    <button onclick="go('customers')" id="d-btn-customers" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="users" class="mr-3 w-5 h-5"></i> ANJANI_AI</button>
    <button onclick="go('leads')" id="d-btn-leads" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="target" class="mr-3 w-5 h-5"></i> LEADS</button>
    <button onclick="go('stock')" id="d-btn-stock" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="package" class="mr-3 w-5 h-5"></i> STOCK</button>
    <button onclick="go('smart')" id="d-btn-smart" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm text-purple-600"><i data-feather="zap" class="mr-3 w-5 h-5"></i> SMART ACTIONS <span id="smart-badge-desk" class="hidden ml-auto bg-orange-500 text-white text-[9px] px-1.5 py-0.5 rounded-full"></span></button>
    <button onclick="go('dashboard')" id="d-btn-dashboard" class="nav-item w-full flex items-center px-6 py-4 font-bold text-sm"><i data-feather="grid" class="mr-3 w-5 h-5"></i> DASHBOARD</button>
  </nav>
</aside>

<header class="lg:hidden fixed top-0 w-full h-16 backdrop-blur-md border-b flex items-center justify-between px-5 z-40 bg-white/90">
  <div class="font-black text-lg text-sky-900">ANJANI<span class="text-sky-500">WATER</span></div>
  <div id="date-badge" class="text-[10px] font-bold px-3 py-1 rounded-full bg-sky-100 text-sky-700">...</div>
</header>

<main class="main-content flex-1 h-full overflow-y-auto no-scrollbar pt-20 lg:pt-8 pb-32 lg:pb-8 px-4 lg:px-8">
  <div id="view-orders">...</div>
  <div id="view-stock" class="hidden">...</div>
  <div id="view-payments" class="hidden">...</div>
  <div id="view-customers" class="hidden">...</div>
  <div id="view-cust-detail" class="hidden">...</div>
  <div id="view-leads" class="hidden">...</div>
  <div id="view-smart" class="hidden">...</div>
  <div id="view-dashboard" class="hidden">...</div>
</main>

<nav class="lg:hidden fixed bottom-0 w-full flex justify-around items-stretch h-20 z-[100] bg-white/95 backdrop-blur-xl border-t border-sky-100 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
  <button onclick="go('orders')" id="m-btn-orders" class="mob-item active flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="shopping-cart" class="w-5 h-5"></i><span class="text-[9px] font-bold">Orders</span></button>
  <button onclick="go('payments')" id="m-btn-payments" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="credit-card" class="w-5 h-5"></i><span class="text-[9px] font-bold">Pay</span></button>
  <button onclick="go('customers')" id="m-btn-customers" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="users" class="w-5 h-5"></i><span class="text-[9px] font-bold">AI</span></button>
  <button onclick="go('leads')" id="m-btn-leads" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="target" class="w-5 h-5"></i><span class="text-[9px] font-bold">Leads</span></button>
  <button onclick="go('stock')" id="m-btn-stock" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="package" class="w-5 h-5"></i><span class="text-[9px] font-bold">Stock</span></button>
  <button onclick="go('smart')" id="m-btn-smart" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1 text-purple-600 relative"><i data-feather="zap" class="w-5 h-5"></i><span class="text-[9px] font-bold">Smart</span><span id="smart-badge-mob" class="hidden absolute top-2 right-2 bg-orange-500 text-white text-[8px] px-1 rounded-full"></span></button>
  <button onclick="go('dashboard')" id="m-btn-dashboard" class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1"><i data-feather="grid" class="w-5 h-5"></i><span class="text-[9px] font-bold">Dash</span></button>
</nav>

<button onclick="forceRefresh()" class="fixed bottom-28 right-4 md:bottom-8 md:right-8 w-12 h-12 rounded-full shadow-xl flex items-center justify-center z-[90] bg-sky-600 text-white border border-white/20 active:scale-90 transition">
  <i data-feather="refresh-cw" class="w-5 h-5"></i>
</button>

<div id="login-screen" class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-sky-900">
  </div>

<script>window.MAPS_API_KEY = 'YOUR_KEY';</script>
<script type="module" src="firebase-api.js"></script>
<script type="module" src="src/app.js"></script>
</body>
</html>
