<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#131921">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ANJANI</title>
  <meta name="application-name" content="ANJANI">
  <meta name="apple-mobile-web-app-title" content="ANJANI">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://esm.sh">

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "dexie":              "https://esm.sh/dexie@4",
      "@sentry/browser":    "https://esm.sh/@sentry/browser@8"
    }
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="src/errors.js"></script>
  <script type="module" src="src/cache.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ══════════════════════════════════════════════════════════
       AMAZON.IN COLOR TOKENS
    ══════════════════════════════════════════════════════════ */
    :root {
      --amz-navy:      #131921;
      --amz-bar:       #232f3e;
      --amz-orange:    #ff9900;
      --amz-orange-lt: #febd69;
      --amz-bg:        #eaeded;
      --amz-white:     #ffffff;
      --amz-border:    #dddddd;
      --amz-text:      #0f1111;
      --amz-muted:     #565959;
      --amz-red:       #b12704;
      --nav-height:    5rem; /* matches original h-20 = 80px */
    }

    /* ── Google Places dropdown ────────────────────────────── */
    .pac-container {
      z-index: 100000 !important;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    /* ── Body ──────────────────────────────────────────────── */
    body {
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background: var(--amz-bg);
      color: var(--amz-text);
      overscroll-behavior: none;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* ══════════════════════════════════════════════════════════
       DESKTOP SIDEBAR NAV ITEMS
    ══════════════════════════════════════════════════════════ */
    .nav-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 14px 24px;
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      border-left: 3px solid transparent;
      background: none;
      cursor: pointer;
      transition: background 0.14s, color 0.14s, border-color 0.14s;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.07);
      color: #fff;
    }
    .nav-item.active {
      background: rgba(255,153,0,0.13);
      color: var(--amz-orange);
      border-left-color: var(--amz-orange);
      font-weight: 700;
    }
    .nav-item.active svg { stroke: var(--amz-orange) !important; }

    /* ══════════════════════════════════════════════════════════
       MOBILE BOTTOM NAV ITEMS
    ══════════════════════════════════════════════════════════ */
    .mob-item { color: var(--amz-muted); }
    .mob-item.active { color: var(--amz-navy); font-weight: 900; }
    .mob-item.active svg { stroke: var(--amz-orange) !important; }

    /* ══════════════════════════════════════════════════════════
       OFFLINE BANNER
    ══════════════════════════════════════════════════════════ */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: var(--amz-red);
      color: white;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      padding: 6px;
    }
    body.is-offline #offline-banner { display: block; }

    /* ══════════════════════════════════════════════════════════
       LOADER — Amazon dark splash screen
    ══════════════════════════════════════════════════════════ */
    #loader {
      background: var(--amz-navy);
    }
    #loader .ld-brand {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    #loader .ld-brand span { color: var(--amz-orange); }
    #loader .ld-sub {
      color: var(--amz-orange-lt);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
    }
    #loader .ld-track {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 20px;
    }
    #loader .ld-fill {
      height: 100%;
      background: var(--amz-orange);
      border-radius: 99px;
      animation: amzbar 1.6s ease-in-out infinite;
    }
    @keyframes amzbar {
      0%   { width: 0%;  margin-left: 0;    }
      50%  { width: 65%; margin-left: 0;    }
      100% { width: 0%;  margin-left: 100%; }
    }
    #loader.hidden { display: none !important; pointer-events: none; }

    /* ══════════════════════════════════════════════════════════
       MOBILE NAV FIXES
       FIX 1: touch-action:manipulation  — kills 300ms tap delay
       FIX 2: transform:translateZ(0)    — own GPU layer, no ghost clicks
       FIX 3: z-[150]                    — nothing can overlap it
       FIX 4: main pb clears nav height  — content never hides under nav
       FIX 5: FAB z-[89] < nav z-[150]  — FAB never steals nav taps
    ══════════════════════════════════════════════════════════ */
    nav.bottom-nav {
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      pointer-events: auto;
      background: var(--amz-white);
      border-top: 1px solid var(--amz-border);
      box-shadow: 0 -2px 8px rgba(0,0,0,0.10);
    }
    nav.bottom-nav button {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      min-height: 44px;
      user-select: none;
      -webkit-user-select: none;
    }
    /* Active orange dot indicator (Amazon app style) */
    .nav-dot {
      display: none;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--amz-orange);
      margin-top: 1px;
    }
    .mob-item.active .nav-dot { display: block; }

    /* Main content bottom padding clears nav + safe area */
    .main-content {
      padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 0.5rem) !important;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    /* Safe-area bottom helper (used on nav buttons) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>

<!-- ═══════════════════════════════════════════════════════════════
     BODY — identical structure to original, only classes/styles changed
════════════════════════════════════════════════════════════════ -->
<body class="text-slate-800 h-screen w-screen overflow-hidden flex flex-col lg:flex-row"
      style="background: var(--amz-bg);">

<!-- Offline banner -->
<div id="offline-banner">⚡ OFFLINE MODE — Changes will sync when connected</div>

<!-- Sync badge -->
<div id="sync-badge"
     style="display:none; position:fixed;
            bottom: calc(var(--nav-height) + env(safe-area-inset-bottom,0px) + 5rem);
            right:16px; z-index:60;
            background: var(--amz-red); color:white;
            border-radius:3px; padding:4px 10px; font-size:10px; font-weight:bold;">
  🔄 <span id="sync-count">0</span> queued
</div>

<!-- ── Loader ─────────────────────────────────────────────────── -->
<div id="loader" class="fixed inset-0 z-[200] flex flex-col items-center justify-center">
  <div class="ld-brand">ANJANI<span>WATER</span></div>
  <div class="ld-sub">LOADING SYSTEM</div>
  <div class="ld-track"><div class="ld-fill"></div></div>
  <div id="debug-log" class="mt-6 text-xs hidden max-w-xs text-center" style="color:#febd69;"></div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     DESKTOP SIDEBAR  — Amazon navy theme
══════════════════════════════════════════════════════════════ -->
<aside class="hidden lg:flex flex-col h-full z-20 flex-shrink-0"
       style="width:220px; background:var(--amz-navy); color:#fff;">

  <!-- Logo -->
  <div style="padding:18px 20px; border-bottom:2px solid var(--amz-orange);
              display:flex; align-items:center; gap:8px;">
    <h1 style="font-size:1.15rem; font-weight:900; color:#fff; letter-spacing:0.5px;">
      ANJANI<span style="color:var(--amz-orange);">WATER</span>
    </h1>
  </div>

  <!-- Nav -->
  <nav class="flex-1 py-3 no-scrollbar" style="overflow-y:auto;">
    <button onclick="go('orders')"    id="d-btn-orders"
            class="nav-item active"><i data-feather="shopping-cart" class="mr-3 w-5 h-5"></i> ORDERS</button>
    <button onclick="go('payments')"  id="d-btn-payments"
            class="nav-item"><i data-feather="credit-card"   class="mr-3 w-5 h-5"></i> PAYMENTS</button>
    <button onclick="go('customers')" id="d-btn-customers"
            class="nav-item"><i data-feather="users"         class="mr-3 w-5 h-5"></i> ANJANI_AI</button>
    <button onclick="go('leads')"     id="d-btn-leads"
            class="nav-item"><i data-feather="target"        class="mr-3 w-5 h-5"></i> LEADS</button>
    <button onclick="go('stock')"     id="d-btn-stock"
            class="nav-item"><i data-feather="package"       class="mr-3 w-5 h-5"></i> STOCK</button>

    <div style="height:1px; background:rgba(255,255,255,0.08); margin:6px 0;"></div>

    <button onclick="go('smart')"     id="d-btn-smart"
            class="nav-item" style="color:#febd69;">
      <i data-feather="zap" class="mr-3 w-5 h-5" style="stroke:#febd69;"></i> SMART ACTIONS
      <span id="smart-badge-desk"
            class="hidden ml-auto text-white text-[9px] px-1.5 py-0.5 rounded"
            style="background:var(--amz-red);"></span>
    </button>
    <button onclick="go('dashboard')" id="d-btn-dashboard"
            class="nav-item"><i data-feather="grid"          class="mr-3 w-5 h-5"></i> DASHBOARD</button>
  </nav>

  <!-- Footer strip -->
  <div style="border-top:1px solid rgba(255,255,255,0.08); padding:12px 20px;
              font-size:11px; color:#999; display:flex; align-items:center; gap:8px;">
    <i data-feather="user" style="width:13px;height:13px;stroke:#febd69;"></i>
    Account &amp; Settings
  </div>
</aside>

<!-- ══════════════════════════════════════════════════════════════
     MOBILE TOP HEADER — Amazon 2-tier bar
     (replaces original single white header)
══════════════════════════════════════════════════════════════ -->

<!-- Tier 1: dark navy -->
<header class="lg:hidden fixed top-0 w-full z-40 flex items-center justify-between px-4 gap-3"
        style="height:52px; background:var(--amz-navy);">
  <div style="font-size:1.1rem; font-weight:900; color:#fff; flex:1;">
    ANJANI<span style="color:var(--amz-orange);">WATER</span>
  </div>
  <div id="date-badge"
       style="background:var(--amz-bar); color:var(--amz-orange-lt);
              font-size:10px; font-weight:700; padding:3px 9px;
              border-radius:3px; border:1px solid rgba(255,153,0,0.25); white-space:nowrap;">
    ...
  </div>
</header>

<!-- Tier 2: secondary bar -->
<div class="lg:hidden fixed left-0 right-0 z-[39] flex items-center gap-1 px-3"
     style="top:52px; height:26px; background:var(--amz-bar); font-size:10px; color:#bbb;">
  <i data-feather="map-pin" style="width:11px;height:11px;stroke:#febd69;flex-shrink:0;"></i>
  <span>Delivering to&nbsp;</span>
  <strong style="color:#fff; font-size:11px;">Vadodara, Gujarat</strong>
</div>

<!-- ══════════════════════════════════════════════════════════════
     MAIN CONTENT
     • mobile pt: 52px (topbar) + 26px (subbar) = 78px
     • pb: handled by .main-content CSS (nav-height + safe-area)
     • Everything else identical to original
══════════════════════════════════════════════════════════════ -->
<main class="main-content flex-1 h-full overflow-y-auto no-scrollbar
             pt-[78px] lg:pt-8 px-4 lg:px-8">
  <div id="view-orders">...</div>
  <div id="view-stock"       class="hidden">...</div>
  <div id="view-payments"    class="hidden">...</div>
  <div id="view-customers"   class="hidden">...</div>
  <div id="view-cust-detail" class="hidden">...</div>
  <div id="view-leads"       class="hidden">...</div>
  <div id="view-smart"       class="hidden">...</div>
  <div id="view-dashboard"   class="hidden">...</div>
</main>

<!-- ══════════════════════════════════════════════════════════════
     MOBILE BOTTOM NAV
     ALL FIXES:
       z-[150]              → highest z in layout
       .bottom-nav          → GPU layer, no ghost clicks
       touch-action on btns → no 300ms delay
       pb-safe on btns      → home indicator clearance
       nav-dot              → Amazon orange active indicator
══════════════════════════════════════════════════════════════ -->
<nav class="bottom-nav lg:hidden fixed bottom-0 w-full
            flex justify-around items-stretch h-20 z-[150]">

  <button onclick="go('orders')"    id="m-btn-orders"
          class="mob-item active flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="shopping-cart" class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">Orders</span>
    <span class="nav-dot"></span>
  </button>

  <button onclick="go('payments')"  id="m-btn-payments"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="credit-card"   class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">Pay</span>
    <span class="nav-dot"></span>
  </button>

  <button onclick="go('customers')" id="m-btn-customers"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="users"         class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">AI</span>
    <span class="nav-dot"></span>
  </button>

  <button onclick="go('leads')"     id="m-btn-leads"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="target"        class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">Leads</span>
    <span class="nav-dot"></span>
  </button>

  <button onclick="go('stock')"     id="m-btn-stock"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="package"       class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">Stock</span>
    <span class="nav-dot"></span>
  </button>

  <button onclick="go('smart')"     id="m-btn-smart"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1 relative"
          style="color:#c7511f;">
    <i data-feather="zap"           class="w-5 h-5" style="stroke:#ff9900;"></i>
    <span class="text-[9px] font-bold" style="color:#c7511f;">Smart</span>
    <span id="smart-badge-mob"
          class="hidden absolute top-2 right-2 text-white text-[8px] px-1 rounded"
          style="background:var(--amz-red);"></span>
    <span class="nav-dot" style="background:#ff9900;"></span>
  </button>

  <button onclick="go('dashboard')" id="m-btn-dashboard"
          class="mob-item flex-1 pb-safe flex flex-col items-center justify-center gap-1">
    <i data-feather="grid"          class="w-5 h-5"></i>
    <span class="text-[9px] font-bold">Dash</span>
    <span class="nav-dot"></span>
  </button>

</nav>

<!-- ══════════════════════════════════════════════════════════════
     REFRESH FAB
     z-[89] = BELOW nav z-[150] so it never steals nav taps
     Position clears nav + safe area via CSS variable
══════════════════════════════════════════════════════════════ -->
<button onclick="forceRefresh()"
        class="fixed right-4 md:bottom-8 md:right-8 w-12 h-12 rounded-full shadow-xl
               flex items-center justify-center z-[89] active:scale-90 transition"
        style="bottom: calc(var(--nav-height) + env(safe-area-inset-bottom,0px) + 0.75rem);
               background: var(--amz-orange);
               border: 2px solid var(--amz-orange-lt);
               touch-action: manipulation;">
  <i data-feather="refresh-cw" class="w-5 h-5" style="stroke:#131921;"></i>
</button>

<!-- ══════════════════════════════════════════════════════════════
     LOGIN SCREEN — untouched, app.js controls this
══════════════════════════════════════════════════════════════ -->
<div id="login-screen"
     class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-sky-900">
</div>

     SCRIPTS — 100% identical to original, nothing changed
══════════════════════════════════════════════════════════════ -->
