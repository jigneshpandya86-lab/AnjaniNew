name: Build Android APK

on:
  push:
    branches: [main, master, claude/add-indiamart-email-processor-bnlQ8]
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Run Android setup script
        run: bash setup-android.sh

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anjani-water-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
