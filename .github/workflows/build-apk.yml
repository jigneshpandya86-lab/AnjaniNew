name: Build Android APK

on:
  workflow_dispatch: 

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Web Dependencies
        run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      - name: Install Capacitor (Cloud Terminal)
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

      - name: Initialize Capacitor
        run: npx cap init "Anjani Water" "com.anjani.water" --web-dir dist

      - name: Generate Android Project
        run: npx cap add android

      - name: Fix Kotlin Duplicate Classes
        working-directory: ./android/app
        run: |
          echo "" >> build.gradle
          echo "configurations.all { resolutionStrategy { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7' } }" >> build.gradle

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: AnjaniWater-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
