name: Build Android APK

on:
  workflow_dispatch: 

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK for Android
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Web Dependencies
        run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      - name: Install Capacitor & Native Plugins
        run: |
          npm install @capacitor/core @capacitor/android
          npm install @capacitor/camera @capacitor/geolocation @capacitor/filesystem
          npm install -D @capacitor/cli

      - name: Initialize Capacitor
        run: npx cap init "Anjani Water" "com.anjani.water" --web-dir dist

      - name: Generate Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Inject Native Permissions (God Mode)
        run: |
          cat << 'EOF' > inject-perms.js
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let data = fs.readFileSync(file, 'utf8');
          
          // Injecting deep system permissions directly into the manifest
          const perms = `
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.READ_SMS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          `;
          
          data = data.replace('</manifest>', perms + '</manifest>');
          fs.writeFileSync(file, data);
          EOF
          node inject-perms.js

      - name: Fix Kotlin Duplicate Classes
        working-directory: ./android/app
        run: |
          echo "" >> build.gradle
          echo "configurations.all { resolutionStrategy { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7' } }" >> build.gradle

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: AnjaniWater-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
